<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Banking UI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fb;
}

/* CARD */
.card {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* FLEX ROW */
.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* ICON BOX */
.icon-box {
    width: 55px;
    height: 55px;
    background: #f0f4ff;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    font-size: 24px;
}

/* TEXT */
.title {
    font-weight: 600;
    font-size: 14px;
}

.subtitle {
    font-size: 12px;
    color: gray;
}

/* BUTTON */
.btn {
    background: #0a84ff;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
}

/* SUCCESS BOX */
.success-box {
    background: black;
    color: white;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
}

.amount {
    font-size: 28px;
    font-weight: bold;
    color: #0a84ff;
}

/* DETAILS */
.details {
    background: #f3f3f3;
    border-radius: 12px;
    padding: 10px;
    font-size: 12px;
}

.details div {
    display: flex;
    justify-content: space-between;
    margin: 6px 0;
}

/* BUTTON GROUP */
.actions {
    display: flex;
    justify-content: space-around;
    margin-top: 10px;
}

.actions button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.outline {
    border: 2px solid #0a84ff;
    color: #0a84ff;
    background: transparent;
}

.primary {
    background: #0a84ff;
    color: white;
}
</style>

</head>
<body>

<!-- FEATURES -->
<div class="card row">
    <div style="display:flex;align-items:center;">
        <div class="icon-box">💵</div>
        <div style="margin-left:10px;">
            <div class="title">Spend & Save</div>
            <div class="subtitle">Save automatically</div>
        </div>
    </div>
    <div class="btn">Start</div>
</div>

<div class="card row">
    <div style="display:flex;align-items:center;">
        <div class="icon-box">📊</div>
        <div style="margin-left:10px;">
            <div class="title">Invest & Earn</div>
            <div class="subtitle">Grow your money</div>
        </div>
    </div>
    <div class="btn">Start</div>
</div>

<div class="card row">
    <div style="display:flex;align-items:center;">
        <div class="icon-box">💳</div>
        <div style="margin-left:10px;">
            <div class="title">Free Debit Card</div>
            <div class="subtitle">Shop worldwide</div>
        </div>
    </div>
    <div class="btn">Start</div>
</div>

<!-- TRANSACTION -->
<div class="card success-box">
    <div>Transaction Successful</div>
    <br>
    <div>Transfer to <b id="namert">John Doe</b></div>
    <div class="amount">$1,250.00</div>
</div>

<!-- DETAILS -->
<div class="card details">
    <div><span>Account Name</span><b id="accna">John Doe</b></div>
    <div><span>Account Number</span><b id="accnum">123456789</b></div>
    <div><span>Transaction ID</span><b>TXN983742</b></div>
    <div><span>Payment Method</span><b>Wallet</b></div>
    <div><span>Date</span><b id="dater">April 3, 2026</b></div>
</div>

<!-- ACTIONS -->
<div class="actions">
    <button class="outline">Report</button>
    <button class="primary">Done</button>
</div>

</body>
    </html>
